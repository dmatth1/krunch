version: "3.9"

# Local dev / CPU-mode smoke test.
# For GPU: add `deploy.resources.reservations.devices` (see gpu profile below)
# and ensure nvidia-container-toolkit is installed.

services:
  krunch:
    image: ghcr.io/dmatth1/krunch:v1
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      RWKV_CUDA_ON: "0"      # CPU mode for local dev (slow but no GPU needed)
      RWKV_JIT_ON: "1"
      KRUNCH_CHUNK_SIZE: "16384"  # smaller chunks so CPU mode isn't unbearable
    volumes:
      # Mount local model weights instead of baking them in during dev
      - ../models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # GPU profile — run with: docker compose --profile gpu up
  krunch-gpu:
    profiles: ["gpu"]
    image: ghcr.io/dmatth1/krunch:v1
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      RWKV_CUDA_ON: "1"
      RWKV_JIT_ON: "1"
    volumes:
      - ../models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
