name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sp-install: brew install sentencepiece pkg-config
            archive: tar.gz
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            sp-install: brew install sentencepiece pkg-config
            archive: tar.gz
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sp-install: sudo apt-get update && sudo apt-get install -y libsentencepiece-dev pkg-config
            archive: tar.gz
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            sp-install: sudo apt-get update && sudo apt-get install -y libsentencepiece-dev pkg-config
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install SentencePiece
        run: ${{ matrix.sp-install }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: l3tc-rust -> target
          key: release-${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build release binary
        working-directory: l3tc-rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          stage="l3tc-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "l3tc-rust/target/${{ matrix.target }}/release/l3tc" "dist/${stage}/"
          cp README.md LICENSE* "dist/${stage}/" 2>/dev/null || true
          cp l3tc-rust/README.md "dist/${stage}/README-crate.md" 2>/dev/null || true
          (cd dist && tar czf "${stage}.tar.gz" "${stage}")
          shasum -a 256 "dist/${stage}.tar.gz" > "dist/${stage}.tar.gz.sha256"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: l3tc-${{ steps.tag.outputs.tag }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: l3tc ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
