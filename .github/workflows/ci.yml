name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1:
    name: Tier 1 — local checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for smoke test
        run: |
          python -m pip install --upgrade pip
          pip install constriction tokenizers zstandard numpy

      - name: Smoke test (blob format, AC codec, chunking, CRC, tokenizer)
        run: |
          # The smoke test loads the GPT-NeoX BPE tokenizer from models/.
          mkdir -p models
          curl -sL https://github.com/BlinkDL/RWKV-LM/raw/main/RWKV-v4/20B_tokenizer.json \
            -o models/20B_tokenizer.json
          python scripts/smoke_test_local.py

      - name: Set up Node for CDK
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CDK type-check + synth
        run: |
          cd deploy/aws-cdk
          npm install --silent
          npx tsc --noEmit
          # cdk synth needs creds for ec2.MachineImage.lookup; stub them
          CDK_DEFAULT_ACCOUNT=000000000000 CDK_DEFAULT_REGION=us-east-1 \
            npx cdk synth --quiet > /dev/null

      - name: krunch submit --dry-run
        run: |
          pip install boto3
          ./scripts/krunch submit \
            --source s3://test/in --dest s3://test/out \
            --workers 4 --dry-run | head -40
