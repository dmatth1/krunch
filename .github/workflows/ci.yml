name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1:
    name: Tier 1 — local checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for smoke test
        run: |
          python -m pip install --upgrade pip
          pip install constriction tokenizers zstandard numpy

      - name: Unit tests (blob format, AC codec, chunking, CRC, tokenizer)
        run: |
          # The blob test loads the GPT-NeoX BPE tokenizer from models/.
          mkdir -p models
          curl -sL https://github.com/BlinkDL/RWKV-LM/raw/main/RWKV-v4/20B_tokenizer.json \
            -o models/20B_tokenizer.json
          python tests/test_blob.py

      - name: Set up Node for CDK
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CDK type-check
        # `cdk synth` needs real AWS credentials (ec2.Vpc.fromLookup +
        # MachineImage.lookup hit the AWS API). Skipped in CI; run locally
        # via tests/quick.sh which authenticates against a real account.
        run: |
          cd deploy/aws-cdk
          npm install --silent
          npx tsc --noEmit

      - name: krunch submit --dry-run
        run: |
          pip install boto3
          ./scripts/krunch submit \
            --source s3://test/in --dest s3://test/out \
            --workers 4 --dry-run | head -40

      - name: krunch plan --dry-run for every target
        run: |
          pip install pytest
          # Render + schema-validate every plan target directly against
          # the krunch package. Catches template syntax errors, missing
          # placeholders, malformed JSON/YAML before they reach ghcr.io.
          PYTHONPATH=. pytest tests/test_plan.py -v
