name: Security audit

on:
  schedule:
    - cron: '0 13 * * 1'  # Mondays 13:00 UTC
  push:
    paths:
      - 'krunch-rust/Cargo.toml'
      - 'krunch-rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: krunch-rust

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: krunch-rust/Cargo.toml
          log-level: warn
          command: check
          arguments: --all-features
