name: Publish image to ghcr.io

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # dmatth1/krunch (lowercased by Docker)

jobs:
  build:
    name: Build + push krunch Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (build needs ~10 GB)
        # GitHub-hosted runners have ~14 GB free; CUDA + PyTorch images need
        # most of it. Strip preinstalled tools we won't use.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h

      - name: Fetch model weights + tokenizer
        # Public BlinkDL release; no auth needed. Cached as actions cache so
        # subsequent runs skip the 325 MB download.
        run: |
          mkdir -p models
          if [ ! -f models/RWKV-4-Pile-169M-20220807-8023.pth ]; then
            curl -sL --fail \
              "https://huggingface.co/BlinkDL/rwkv-4-pile-169m/resolve/main/RWKV-4-Pile-169M-20220807-8023.pth" \
              -o models/RWKV-4-Pile-169M-20220807-8023.pth
          fi
          curl -sL --fail \
            "https://github.com/BlinkDL/RWKV-LM/raw/main/RWKV-v4/20B_tokenizer.json" \
            -o models/20B_tokenizer.json
          ls -lh models/

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: models/RWKV-4-Pile-169M-20220807-8023.pth
          key: rwkv-4-pile-169m-20220807-8023

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push image
        # WKV kernel warmup is skipped (no GPU on the runner); first
        # `krunch compress` on a real GPU compiles + caches it.
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
