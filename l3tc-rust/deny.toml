# cargo-deny configuration for l3tc-rust
#
# Run locally:
#   cargo install cargo-deny
#   cargo deny --manifest-path l3tc-rust/Cargo.toml check

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Apache-2.0 is the crate's own license. The allowlist below is the
# set of permissive licenses that are acceptable in direct and
# transitive dependencies. Adjust only after legal review (task 22).
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "Unlicense",
    # Community Data License Agreement — Permissive 2.0. Used by
    # `webpki-roots` (the Mozilla CA trust bundle shipped with
    # rustls/ureq for HTTPS). Permissive redistribution terms;
    # Apache-2.0-compatible for our use as a transitive dep.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
