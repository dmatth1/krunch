# Local cargo configuration.
#
# Release builds default to the generic ISA for the selected target
# so that the resulting binary is portable across machines of that
# architecture. This is what release/CI pipelines want.
#
# For maximum local throughput (Phase 2.5 benchmarking), opt in to
# host-specific codegen by setting `RUSTFLAGS`:
#
#     RUSTFLAGS="-C target-cpu=native" cargo build --release
#
# or export it in your shell profile. On Apple Silicon this enables
# ARMv8.5 / NEON variants that rustc's default `aarch64-apple-darwin`
# target does not assume. The resulting binary is non-portable (built
# for the exact CPU model of the build machine).
#
# IMPORTANT: a previous `[build] rustflags = ["-C", "target-cpu=native"]`
# here broke cross-compilation from Apple Silicon to `x86_64-apple-darwin`
# because LLVM rejects `apple-m1` as an x86_64 subtarget. Keep
# target-cpu flags on the command line / env var, not in this file.
