# AWS CodeBuild spec for the training + compression Docker images.
#
# Why CodeBuild: laptop uploads at ~5 Mbps hit 30-90 min cold pushes of
# the ~5 GB PyTorch CUDA devel image. CodeBuild runs inside AWS and
# pushes to ECR over the AWS backbone in ~3 min.
#
# Trigger this manually during iteration:
#   aws codebuild start-build --project-name krunch-image-build \
#     --source-version refs/heads/main \
#     --region us-east-1
#
# Then pull the resulting image tag from the build's primary artifact
# (printed at the end as IMAGE_TAG=...).

version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    ECR_REPO: cdk-hnb659fds-container-assets-584956668248-us-east-1
    TRAIN_DOCKERFILE: cdk/docker/training/Dockerfile
    COMPRESS_DOCKERFILE: cdk/docker/compression/Dockerfile
    TRAIN_IMAGE_NAME: krunch-train
    COMPRESS_IMAGE_NAME: krunch-compress

phases:
  pre_build:
    commands:
      - echo "=== pre_build ==="
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin "${ECR_URI}"
      - SHORT_SHA=$(git rev-parse --short=12 HEAD)
      - TRAIN_TAG="${TRAIN_IMAGE_NAME}-${SHORT_SHA}"
      - COMPRESS_TAG="${COMPRESS_IMAGE_NAME}-${SHORT_SHA}"
      # vendor/L3TC is gitignored in this repo — clone it fresh from
      # upstream so the training Dockerfile's COPY vendor/L3TC finds
      # it. Pin strategy tracked in PRODUCTION_TODO item 9.
      - git clone --depth 1 https://github.com/alipay/L3TC-leveraging-rwkv-for-learned-lossless-low-complexity-text-compression.git vendor/L3TC
      - echo "L3TC cloned at $(git -C vendor/L3TC rev-parse HEAD)"
      # Register QEMU user-mode emulators so `docker build --platform
      # linux/arm64` works from this x86 CodeBuild host. The
      # compression image targets ARM64 Fargate Graviton; the training
      # image stays x86_64 (PyTorch CUDA wheels are x86-only).
      #
      # Pulling from public.ecr.aws/eks-distro-build-tooling instead
      # of Docker Hub's tonistiigi/binfmt — anonymous Docker Hub
      # rate-limited the latter on 2026-04-22. AWS-mirrored image is
      # the same upstream binfmt installer (EKS-distro fork) and
      # accepts the same --install arm64 invocation.
      - docker run --privileged --rm public.ecr.aws/eks-distro-build-tooling/binfmt-misc:qemu-v9.2.2 --install arm64

  build:
    commands:
      # Training image stays on x86_64: the PyTorch CUDA training wheel
      # set is x86_64-only for the NVIDIA G-series GPUs, so training
      # runs on x86 Batch and the image has to match.
      - echo "=== build training image (linux/amd64) ==="
      - docker build -f ${TRAIN_DOCKERFILE} --platform linux/amd64 -t ${ECR_URI}:${TRAIN_TAG} .
      # Compression image is linux/arm64: Fargate Graviton recovers
      # the M-series NEON SIMD path for the l3tc-rust neural codec,
      # which was 10x slower on x86 Fargate. CodeBuild project must
      # run on ARM_CONTAINER compute so this is a native build (not
      # QEMU emulation, which would be 5x slower).
      - echo "=== build compression image (linux/arm64) ==="
      - docker build -f ${COMPRESS_DOCKERFILE} --platform linux/arm64 -t ${ECR_URI}:${COMPRESS_TAG} .

  post_build:
    commands:
      - echo "=== post_build push both images ==="
      # The CDK-managed ECR repo has tag immutability. Git-SHA tags
      # are unique per commit, so no moving tags.
      - docker push ${ECR_URI}:${TRAIN_TAG}
      - docker push ${ECR_URI}:${COMPRESS_TAG}
      - echo "TRAIN_URI=${ECR_URI}:${TRAIN_TAG}"
      - echo "COMPRESS_URI=${ECR_URI}:${COMPRESS_TAG}"
      - printf '{"train_uri":"%s","train_tag":"%s","compress_uri":"%s","compress_tag":"%s","sha":"%s"}\n' "${ECR_URI}:${TRAIN_TAG}" "${TRAIN_TAG}" "${ECR_URI}:${COMPRESS_TAG}" "${COMPRESS_TAG}" "${SHORT_SHA}" > image-info.json

artifacts:
  files:
    - image-info.json
  name: krunch-image-build
